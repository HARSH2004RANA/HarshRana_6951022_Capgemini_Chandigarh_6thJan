<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Greeting Card</title>

<style>

body{
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    font-family: "Comic Sans MS", cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card{
    background: white;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
    width: 400px;
}

h1{
    color: #ff4081;
}

p{
    font-size: 18px;
}

button{
    background: #ff4081;
    color: white;
    border: none;
    padding: 12px 20px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover{
    background: #e91e63;
}

#surprise{
    display: none;
    margin-top: 20px;
    font-size: 20px;
    color: #4CAF50;
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Happy Birthday! 🎂</h1>

<p>May your day be filled with happiness and wonderful surprises.</p>

<button onclick="showMessage()">Click for a Surprise</button>

<p id="surprise"> Wishing you lots of joy Moni! <br> Hope you top the M1 exam.</p>

</div>

<script>

function showMessage(){
    document.getElementById("surprise").style.display = "block";
}

</script>

</body>
</html>
